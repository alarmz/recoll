name: CI

on:
  push:
    branches: [ main, recoll-1.43.14 ]
  pull_request:
    branches: [ main, recoll-1.43.14 ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev libicu-dev \
            qt6-base-dev qt6-webengine-dev qt6-tools-dev qt6-tools-dev-tools \
            libgl1-mesa-dev libaspell-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=ON \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_QTGUI=ON \
            -DRECOLL_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test
        run: |
          ./build/recollq --help || true
          ./build/recollindex --help || true
          file ./build/recoll ./build/recollindex ./build/recollq

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '1e199d32ad53aab1defda61ce41c380302e3f95c'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Pre-cache xapian source (fallback for unreliable upstream)
        shell: bash
        run: |
          mkdir -p "$VCPKG_ROOT/downloads"
          curl -fSL --retry 1 --connect-timeout 10 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://oligarchy.co.uk/xapian/1.4.22/xapian-core-1.4.22.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://deb.debian.org/debian/pool/main/x/xapian-core/xapian-core_1.4.22.orig.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://github.com/alarmz/recoll/releases/download/deps/xapian-core-1.4.22.tar.xz"

      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install xapian:x64-windows libxml2:x64-windows libxslt:x64-windows zlib:x64-windows libiconv:x64-windows

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Configure
        shell: cmd
        run: |
          set "SAVED_VCPKG_ROOT=%VCPKG_ROOT%"
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          set "VCPKG_ROOT=%SAVED_VCPKG_ROOT%"
          cmake -S . -B build_win -G Ninja ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DRECOLL_QTGUI=ON ^
            -DRECOLL_QT6_BUILD=ON ^
            -DRECOLL_ENABLE_WEBENGINE=ON ^
            -DRECOLL_BUILD_TESTS=OFF ^
            -DXAPIAN_SHARED=ON

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build build_win --parallel

      - name: Smoke test
        shell: cmd
        run: |
          dir build_win\recoll.exe build_win\recollindex.exe build_win\recollq.exe
