name: CI

on:
  push:
    branches: [ main, recoll-next ]
  pull_request:
    branches: [ main, recoll-next ]

jobs:
  rust-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev \
            qtbase5-dev qtwebengine5-dev qttools5-dev \
            libaspell-dev

      - name: Configure
        working-directory: src
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=OFF \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_BUILD_TESTS=ON \
            -DRECOLL_QTGUI=OFF

      - name: Build
        working-directory: src
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: src/build
        run: ctest --output-on-failure || ./catch/recoll_tests

  test-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: cmd
        run: |
          cd /d %VCPKG_INSTALLATION_ROOT%
          bootstrap-vcpkg.bat

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install dependencies
        run: |
          vcpkg install xapian:x64-windows libxml2:x64-windows libxslt:x64-windows zlib:x64-windows libiconv:x64-windows

      - name: Configure
        working-directory: src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake -S . -B build_win -G Ninja ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%/scripts/buildsystems/vcpkg.cmake" ^
            -DRECOLL_QTGUI=OFF ^
            -DRECOLL_BUILD_TESTS=ON ^
            -DXAPIAN_SHARED=OFF ^
            "-DXAPIAN_STATIC_LIBRARY=%VCPKG_INSTALLATION_ROOT%/installed/x64-windows/lib/xapian.lib"

      - name: Build
        working-directory: src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build build_win --parallel

      - name: Run tests
        working-directory: src/build_win
        shell: cmd
        run: ctest --output-on-failure || catch\recoll_tests.exe
