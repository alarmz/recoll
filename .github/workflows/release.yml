name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev \
            qtbase5-dev qtwebengine5-dev qttools5-dev \
            libaspell-dev

      - name: Configure
        working-directory: src
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=OFF \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_BUILD_TESTS=ON \
            -DRECOLL_QTGUI=OFF

      - name: Build
        working-directory: src
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: src/build
        run: ctest --output-on-failure || ./catch/recoll_tests

      - name: Package
        working-directory: src
        run: |
          mkdir -p release/recoll-linux-x64
          cp build/recollindex build/recollq release/recoll-linux-x64/
          if [ -f build/librecoll.so ]; then cp build/librecoll.so* release/recoll-linux-x64/; fi
          cp -r sampleconf release/recoll-linux-x64/examples
          tar czf recoll-linux-x64.tar.gz -C release recoll-linux-x64

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: src/recoll-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: "clear"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '1e199d32ad53aab1defda61ce41c380302e3f95c'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Pre-cache xapian source (fallback for unreliable upstream)
        shell: bash
        run: |
          mkdir -p "$VCPKG_ROOT/downloads"
          curl -fSL --retry 1 --connect-timeout 10 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://oligarchy.co.uk/xapian/1.4.22/xapian-core-1.4.22.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://deb.debian.org/debian/pool/main/x/xapian-core/xapian-core_1.4.22.orig.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://github.com/alarmz/recoll/releases/download/deps/xapian-core-1.4.22.tar.xz"

      - name: Install dependencies
        run: |
          vcpkg install xapian:x64-windows libxml2:x64-windows libxslt:x64-windows zlib:x64-windows libiconv:x64-windows

      - name: Configure
        working-directory: src
        shell: cmd
        run: |
          set "SAVED_VCPKG_ROOT=%VCPKG_ROOT%"
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          set "VCPKG_ROOT=%SAVED_VCPKG_ROOT%"
          cmake -S . -B build_win -G Ninja ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake" ^
            -DRECOLL_QTGUI=OFF ^
            -DRECOLL_BUILD_TESTS=ON ^
            -DXAPIAN_SHARED=OFF ^
            "-DXAPIAN_STATIC_LIBRARY=%VCPKG_ROOT%/installed/x64-windows/lib/xapian.lib"

      - name: Build
        working-directory: src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build build_win --parallel

      - name: Run tests
        working-directory: src/build_win
        shell: cmd
        run: ctest --output-on-failure || catch\recoll_tests.exe

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.event.release.tag_name }} /DQtPlatformPluginDir=%VCPKG_ROOT%\installed\x64-windows\Qt6\plugins\platforms installer\recoll.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/recoll-*-win64-setup.exe
