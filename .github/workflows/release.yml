name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev \
            qtbase5-dev qtwebengine5-dev qttools5-dev \
            libaspell-dev

      - name: Configure
        working-directory: src
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=OFF \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_BUILD_TESTS=ON \
            -DRECOLL_QTGUI=OFF

      - name: Build
        working-directory: src
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: src/build
        run: ctest --output-on-failure || ./catch/recoll_tests

      - name: Package tarball
        working-directory: src
        run: |
          mkdir -p release/recoll-linux-x64
          cp build/recollindex build/recollq release/recoll-linux-x64/
          if [ -f build/librecoll.so ]; then cp build/librecoll.so* release/recoll-linux-x64/; fi
          cp -r sampleconf release/recoll-linux-x64/examples
          tar czf recoll-linux-x64.tar.gz -C release recoll-linux-x64

      - name: Build RPM
        run: |
          sudo apt-get install -y rpm
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}

          # Prepare SOURCES with build outputs
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          cp src/build/recollindex src/build/recollq ~/rpmbuild/SOURCES/
          if ls src/build/librecoll.so* 1>/dev/null 2>&1; then
            cp -a src/build/librecoll.so* ~/rpmbuild/SOURCES/
          fi
          cp -r src/sampleconf ~/rpmbuild/SOURCES/sampleconf
          cp -r src/filters ~/rpmbuild/SOURCES/filters

          rpmbuild -bb \
            --define "rpm_version ${VERSION}" \
            --define "_sourcedir $HOME/rpmbuild/SOURCES" \
            packaging/rpm/recoll-release.spec

          cp ~/rpmbuild/RPMS/x86_64/recoll-*.rpm .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/recoll-linux-x64.tar.gz
            recoll-*.rpm

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_ROOT: C:\vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Update vcpkg
        run: |
          cd C:\vcpkg
          git pull
          .\bootstrap-vcpkg.bat
        shell: cmd

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install xapian:x64-windows libxml2:x64-windows libxslt:x64-windows zlib:x64-windows libiconv:x64-windows

      - name: Configure
        working-directory: src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake -S . -B build_win -G Ninja ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DRECOLL_QTGUI=OFF ^
            -DRECOLL_BUILD_TESTS=ON ^
            -DXAPIAN_SHARED=OFF ^
            "-DXAPIAN_STATIC_LIBRARY=C:/vcpkg/installed/x64-windows/lib/xapian.lib"

      - name: Build
        working-directory: src
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build build_win --parallel

      - name: Run tests
        working-directory: src/build_win
        shell: cmd
        run: ctest --output-on-failure || catch\recoll_tests.exe

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.event.release.tag_name }} /DQtPlatformPluginDir=C:\vcpkg\installed\x64-windows\Qt6\plugins\platforms installer\recoll.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/recoll-*-win64-setup.exe
