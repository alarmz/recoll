name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to use (e.g. 1.43.14)'
        required: true
        default: '1.43.14'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VER="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="$(cat RECOLL-VERSION.txt | tr -d '[:space:]')"
          fi
          # strip leading 'v' if present
          VER="${VER#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version: $VER"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev libicu-dev \
            qt6-base-dev qt6-webengine-dev qt6-tools-dev qt6-tools-dev-tools \
            libgl1-mesa-dev libaspell-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DRECOLL_QT6_BUILD=ON \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_QTGUI=ON \
            -DRECOLL_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package tarball
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="recoll-${VERSION}-linux-x64"
          mkdir -p "release/${STAGE}/bin" "release/${STAGE}/share/recoll/examples" "release/${STAGE}/share/recoll/filters"
          cp build/recoll build/recollindex build/recollq "release/${STAGE}/bin/" 2>/dev/null || true
          # librecoll on linux is shared
          if ls build/librecoll.so* >/dev/null 2>&1; then
            mkdir -p "release/${STAGE}/lib"
            cp -a build/librecoll.so* "release/${STAGE}/lib/"
          fi
          cp -r sampleconf/* "release/${STAGE}/share/recoll/examples/" 2>/dev/null || true
          cp -r filters/* "release/${STAGE}/share/recoll/filters/" 2>/dev/null || true
          cp COPYING README "release/${STAGE}/" 2>/dev/null || true
          tar czf "recoll-${VERSION}-linux-x64.tar.gz" -C release "${STAGE}"
          ls -la "recoll-${VERSION}-linux-x64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recoll-linux-x64
          path: recoll-*-linux-x64.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: recoll-*-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VER="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="$(cat RECOLL-VERSION.txt | tr -d '[:space:]')"
          fi
          VER="${VER#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '1e199d32ad53aab1defda61ce41c380302e3f95c'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Pre-cache xapian source (fallback for unreliable upstream)
        shell: bash
        run: |
          mkdir -p "$VCPKG_ROOT/downloads"
          curl -fSL --retry 1 --connect-timeout 10 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://oligarchy.co.uk/xapian/1.4.22/xapian-core-1.4.22.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://deb.debian.org/debian/pool/main/x/xapian-core/xapian-core_1.4.22.orig.tar.xz" \
          || curl -fSL --retry 2 -o "$VCPKG_ROOT/downloads/xapian-core-1.4.22.tar.xz" \
            "https://github.com/alarmz/recoll/releases/download/deps/xapian-core-1.4.22.tar.xz"

      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install xapian:x64-windows libxml2:x64-windows libxslt:x64-windows zlib:x64-windows libiconv:x64-windows

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Configure
        shell: cmd
        run: |
          set "SAVED_VCPKG_ROOT=%VCPKG_ROOT%"
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          set "VCPKG_ROOT=%SAVED_VCPKG_ROOT%"
          cmake -S . -B build_win -G Ninja ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DRECOLL_QTGUI=ON ^
            -DRECOLL_QT6_BUILD=ON ^
            -DRECOLL_ENABLE_WEBENGINE=ON ^
            -DRECOLL_BUILD_TESTS=OFF ^
            -DXAPIAN_SHARED=ON

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64
          cmake --build build_win --parallel

      - name: Stage payload (windeployqt + dependencies)
        shell: cmd
        run: |
          mkdir dist
          mkdir dist\Share
          mkdir dist\Share\examples
          mkdir dist\Share\filters
          mkdir dist\Share\images
          copy /Y build_win\recoll.exe dist\
          copy /Y build_win\recollindex.exe dist\
          copy /Y build_win\recollq.exe dist\
          "%Qt6_DIR%\bin\windeployqt.exe" --release --no-translations --no-system-d3d-compiler --no-opengl-sw dist\recoll.exe
          for %%D in (xapian.dll libxml2.dll libxslt.dll iconv-2.dll zlib1.dll charset-1.dll exslt.dll lzma.dll bz2.dll liblzma.dll) do (
            if exist "%VCPKG_ROOT%\installed\x64-windows\bin\%%D" copy /Y "%VCPKG_ROOT%\installed\x64-windows\bin\%%D" dist\
          )
          xcopy /E /Y /I sampleconf dist\Share\examples
          xcopy /E /Y /I filters dist\Share\filters
          if exist desktop\recoll.png copy /Y desktop\recoll.png dist\Share\images\
          if exist desktop\recoll.svg copy /Y desktop\recoll.svg dist\Share\images\
          copy /Y COPYING dist\COPYING.txt
          dir dist

      - name: Stage VC++ runtime
        shell: pwsh
        run: |
          $vcredist = Get-ChildItem -Path "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -Recurse -Filter vc_redist.x64.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vcredist) {
            Copy-Item $vcredist.FullName dist\vc_redist.x64.exe
          } else {
            # fallback: download
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile dist\vc_redist.x64.exe
          }

      - name: Generate Inno Setup script
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p installer
          cat > installer/recoll-ci.iss <<EOF
          #define MyAppName "Recoll"
          #define MyAppVersion "${VERSION}"
          #define MyAppPublisher "Recoll.org"
          #define MyAppURL "http://www.recoll.org"
          #define MyAppExeName "recoll.exe"
          #define IdxAppName "Recollindex background indexer"
          #define IdxAppExeName "recollindex.exe"
          #define DistDir "..\\dist"

          [Setup]
          AppId={{E9BC39EC-0E3D-4DDA-8DA0-FDB8ED16DC8D}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}
          AppUpdatesURL={#MyAppURL}
          ArchitecturesInstallIn64BitMode=x64compatible
          ArchitecturesAllowed=x64compatible
          DefaultGroupName={#MyAppName}
          OutputDir=Output
          Compression=lzma
          SolidCompression=yes
          PrivilegesRequired=admin
          DefaultDirName={commonpf}\\{#MyAppName}
          LicenseFile={#DistDir}\\COPYING.txt
          OutputBaseFilename=recoll-setup-{#MyAppVersion}-x64
          WizardStyle=modern

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "{#DistDir}\\vc_redist.x64.exe"; DestDir: {tmp}; Flags: dontcopy
          Source: "{#DistDir}\\recoll.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "{#DistDir}\\recollindex.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "{#DistDir}\\recollq.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "{#DistDir}\\*"; DestDir: "{app}"; Excludes: "vc_redist.x64.exe,recoll.exe,recollindex.exe,recollq.exe"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\\{#MyAppName}"; Filename: "{app}\\{#MyAppExeName}"
          Name: "{group}\\{#IdxAppName}"; Filename: "{app}\\{#IdxAppExeName}"; IconFilename: "{app}\\{#MyAppExeName}"; Parameters: "-m -w 0"; Flags: runminimized preventpinning
          Name: "{commondesktop}\\{#MyAppName}"; Filename: "{app}\\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{tmp}\\vc_redist.x64.exe"; StatusMsg: "Installing VC++ runtime"; Parameters: "/quiet /norestart"; Check: VCRedistNeedsInstall; Flags: waituntilterminated
          Filename: "{app}\\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent

          [Code]
          function VCRedistNeedsInstall: Boolean;
          var
            Version: String;
          begin
            if RegQueryStringValue(HKEY_LOCAL_MACHINE,
                 'SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64', 'Version', Version) then
            begin
              Result := (CompareStr(Version, 'v14.42.34438.00') < 0);
            end
            else
            begin
              Result := True;
            end;
            if (Result) then ExtractTemporaryFile('vc_redist.x64.exe');
          end;
          EOF

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\recoll-ci.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: recoll-windows-x64
          path: installer/Output/recoll-setup-*.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/recoll-setup-*.exe
