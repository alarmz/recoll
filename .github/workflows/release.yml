name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libxapian-dev libxml2-dev libxslt1-dev zlib1g-dev \
            qtbase5-dev qtwebengine5-dev qttools5-dev \
            libaspell-dev

      - name: Configure
        working-directory: src
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=OFF \
            -DRECOLL_ENABLE_WEBENGINE=ON \
            -DRECOLL_BUILD_TESTS=ON \
            -DRECOLL_QTGUI=OFF

      - name: Build
        working-directory: src
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: src/build
        run: ctest --output-on-failure || ./catch/recoll_tests

      - name: Package
        working-directory: src
        run: |
          mkdir -p release/recoll-linux-x64
          cp build/recollindex build/recollq release/recoll-linux-x64/
          if [ -f build/librecoll.so ]; then cp build/librecoll.so* release/recoll-linux-x64/; fi
          cp -r sampleconf release/recoll-linux-x64/examples
          tar czf recoll-linux-x64.tar.gz -C release recoll-linux-x64

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: src/recoll-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-xapian-core
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libxslt
            mingw-w64-x86_64-zlib

      - name: Fix xapian cmake config path
        run: |
          sed -i 's|^SET(prefix "/mingw64")|get_filename_component(prefix "${CMAKE_CURRENT_LIST_DIR}/../../../" ABSOLUTE)|' \
            /$MSYSTEM_PREFIX/lib/cmake/xapian/xapian-config.cmake

      - name: Configure
        run: |
          cmake -S src -B build_mingw -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DRECOLL_QT6_BUILD=ON \
            -DRECOLL_ENABLE_WEBENGINE=OFF \
            -DRECOLL_ENABLE_LIBMAGIC=OFF \
            -DRECOLL_ENABLE_SYSTEMD=OFF \
            -DRECOLL_ENABLE_X11MON=OFF

      - name: Build
        run: cmake --build build_mingw --parallel

      - name: Run tests
        run: |
          cd build_mingw
          ctest --output-on-failure || catch/recoll_tests.exe || true

      - name: Prepare installer dist
        run: |
          VERSION=$(cat src/RECOLL-VERSION.txt | tr -d '[:space:]')
          mkdir -p installer/dist/share

          # Copy executables
          cp build_mingw/recoll.exe build_mingw/recollindex.exe build_mingw/recollq.exe installer/dist/

          # Deploy Qt dependencies
          windeployqt6 installer/dist/recoll.exe

          # Copy MinGW runtime DLLs
          for dll in \
            libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll \
            libxapian-30.dll libxml2-16.dll libxslt-1.dll zlib1.dll libiconv-2.dll \
            libb2-1.dll libdouble-conversion.dll \
            libicuin78.dll libicuuc78.dll libicudt78.dll \
            libpcre2-16-0.dll libpcre2-8-0.dll libzstd.dll \
            libsystre-0.dll libtre-5.dll libintl-8.dll \
            libmd4c.dll libpng16-16.dll libfreetype-6.dll \
            libbz2-1.dll libbrotlidec.dll libbrotlicommon.dll \
            libharfbuzz-0.dll libgraphite2.dll libglib-2.0-0.dll; do
            cp "/$MSYSTEM_PREFIX/bin/$dll" installer/dist/ 2>/dev/null || true
          done

          # Copy icon, config, and filters
          cp src/desktop/recoll.ico installer/dist/
          cp -r src/sampleconf installer/dist/share/
          cp -r src/filters installer/dist/share/

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          for /f "delims=" %%v in (src\RECOLL-VERSION.txt) do set "RECOLL_VER=%%v"
          "%programfiles(x86)%\Inno Setup 6\ISCC.exe" /DMyAppVersion=%RECOLL_VER% installer\recoll.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/recoll-*-win64-setup.exe
