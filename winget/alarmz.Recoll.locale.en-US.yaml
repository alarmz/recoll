ShortDescription: Free Recoll Windows installer and desktop full-text search tool
Description: >-
  Recoll is a desktop full-text search tool that finds keywords inside documents
  and file names. This package provides a free Windows installer and prebuilt
  binaries for Recoll. It supports most document formats, can search files,
  archive members, and email attachments, with transparent decompression. Free
  and open source.
